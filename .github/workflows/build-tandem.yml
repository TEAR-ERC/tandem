name: tandem-build

on:
  push:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      PETSC_CACHE_FOLDER: ${{ github.workspace }}/.petsc
      PETSC_VERSION: 3.19.2
      COMPILER: gcc-12
      ARCHITECTURE: arch-linux-c-opt

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache PETSc Installation
        id: cache-petsc
        uses: actions/cache@v3
        with:
          path: ${{ env.PETSC_CACHE_FOLDER }}
          key: petsc-${{ env.PETSC_VERSION }}-${{ env.COMPILER }}-${{ env.ARCHITECTURE }}
          restore-keys: petsc-${{ env.PETSC_VERSION }}-${{ env.COMPILER }}-${{ env.ARCHITECTURE }}-

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install \
            gcc-12 \
            g++-12 \
            cmake \
            openmpi-bin \
            openmpi-common \
            libopenmpi-dev \
            libmetis-dev \
            libparmetis-dev \
            libeigen3-dev \
            python3 \
            python3-numpy \
            libopenblas-base \
            libopenblas-dev \
            liblua5.3-0 \
            liblua5.3-dev

      - name: Install PETSc
        if: steps.cache-petsc.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          install_dir=${{ env.PETSC_CACHE_FOLDER }}
          version=${{ env.PETSC_VERSION }}
          mkdir -p ${install_dir}
          wget http://ftp.mcs.anl.gov/pub/petsc/release-snapshots/petsc-lite-${version}.tar.gz
          tar -xvf petsc-lite-${version}.tar.gz
          cd petsc-${version}
          ./configure --with-fortran-bindings=0 --with-debugging=0 \
              --with-memalign=32 --with-64-bit-indices \
              CC=mpicc CXX=mpicxx FC=mpif90 --prefix=${install_dir}
          COPTFLAGS="-g -O3" CXXOPTFLAGS="-g -O3"
          make PETSC_DIR=`pwd` PETSC_ARCH=${{ env.ARCHITECTURE }} -j$(nproc)
          make PETSC_DIR=`pwd` PETSC_ARCH=${{ env.ARCHITECTURE }} install
          cd ..

      - name: Build and Test Tandem
        run: |
          set -euo pipefail
          mkdir build && cd build
          cmake .. -DCMAKE_PREFIX_PATH=${{ env.PETSC_CACHE_FOLDER }}
          make -j$(nproc)
          make test

