name: Build and Push Tandem Release Images

on:
  push:
    branches:
      - ymagen/docker-release-images    # your PR branch - builds for testing
    paths:
      - 'docker/release/**'      # trigger if Dockerfiles changed
      - '.github/workflows/release-images.yml'  # trigger if workflow itself changed
    tags:
      - 'v*'                     # v1.2.0, v1.3.0 etc - full versioned release
  workflow_dispatch:             # manual trigger from GitHub Actions UI

env:
  REGISTRY: ghcr.io
  TANDEM_BASE: ghcr.io/${{ github.repository_owner }}/tandem-base
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/tandem

jobs:
  # ── Job 1: Build and push base image ────────────────────────────────────────
  build-base:
    name: Build base image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # Pass the exact base image tag to downstream jobs so they pull the right one
    outputs:
      base-tag: ${{ steps.base-tag.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Compute a unique tag for this run so downstream jobs know exactly what to pull.
      # On branch: ghcr.io/tear-erc/tandem-base:ymagen-docker-release-images
      # On tag:    ghcr.io/tear-erc/tandem-base:1.2.0
      - name: Compute base image tag
        id: base-tag
        run: |
          REF="${{ github.ref_name }}"
          SAFE="${REF//\//-}"          # replace / with - for branch names
          TAG="${{ env.TANDEM_BASE }}:${SAFE}"
          echo "tag=${TAG,,}" >> $GITHUB_OUTPUT  # lowercase entire tag

      - name: Extract metadata for base image
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.TANDEM_BASE }}
          tags: |
            # Always push the branch/tag name
            type=ref,event=branch
            type=ref,event=tag
            # Version tags on release
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/release/Dockerfile.base
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Build tandem image (all configs) ──────────────────────────────────
  build-tandem:
    name: Build tandem image
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata for tandem image
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_BASE }}
          tags: |
            # PR branch → :ymagen-docker-release-images (for testing)
            type=raw,value=${{ github.ref_name }},enable=${{ github.ref_type == 'branch' }}
            # Version tag → :1.2.0, :1.2, :latest
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push tandem image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/release/Dockerfile.all
          platforms: linux/amd64
          push: true
          # Use the exact base tag produced by job 1, not :latest
          build-args: |
            BASE_IMAGE=${{ needs.build-base.outputs.base-tag }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
