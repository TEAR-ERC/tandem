name: Build and Push Tandem Release Images

on:
  push:
    branches:
      - ymagen/docker-release-images    # your PR branch - builds for testing
    paths:
      - 'docker/release/**'      # trigger if Dockerfiles changed
      - '.github/workflows/release-images.yml'  # trigger if workflow itself changed
    tags:
      - 'v*'                     # v1.2.0, v1.3.0 etc - full versioned release
  workflow_dispatch:             # manual trigger from GitHub Actions UI

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/tandem

jobs:
  # ── Build tandem image (all configs) ─────────────────────────────────────────
  build-tandem:
    name: Build tandem image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata for tandem image
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_BASE }}
          tags: |
            # PR branch → :ymagen-docker-release-images (for testing)
            type=raw,value=${{ github.ref_name }},enable=${{ github.ref_type == 'branch' }}
            # Version tag → :1.2.0, :1.2, :latest
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push tandem image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/release/Dockerfile.all
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
