name: Build and Push Tandem Release Images

on:
  push:
    branches:
      - ymagen/docker-release-images    # your PR branch - builds for testing
    paths:
      - 'docker/release/**'      # only trigger if Dockerfiles actually changed
    tags:
      - 'v*'                     # v1.2.0, v1.3.0 etc - full versioned release
  workflow_dispatch:             # manual trigger from GitHub Actions UI

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/tandem

jobs:
  # ── Job 1: Build and push base image ────────────────────────────────────────
  build-base:
    name: Build base image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for base image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}-base
          tags: |
            # PR branch → :branch-name, e.g. tandem-base:ymagen-docker-release-images
            type=ref,event=branch
            # Version tag → :1.2.0, :1.2, :latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: docker/release
          file: docker/release/Dockerfile.base
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Build all 12 DIM+DEG images in parallel ──────────────────────────
  build-images:
    name: Build tandem:${{ matrix.dim }}d-${{ matrix.deg }}p
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        dim: [2, 3]
        deg: [1, 2, 3, 4, 5, 6]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}
          tags: |
            # PR branch → :2d-6p-ymagen-docker-release-images (for testing)
            type=raw,value=${{ matrix.dim }}d-${{ matrix.deg }}p-${{ github.ref_name }},enable=${{ github.ref_type == 'branch' }}
            # Version tag → :2d-6p-1.2.0, :2d-6p-1.2, :2d-6p-latest
            type=raw,value=${{ matrix.dim }}d-${{ matrix.deg }}p-${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ matrix.dim }}d-${{ matrix.deg }}p-latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # Bare tag only on release, e.g. :2d-6p
            type=raw,value=${{ matrix.dim }}d-${{ matrix.deg }}p,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: docker/release
          file: docker/release/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            DIM=${{ matrix.dim }}
            DEG=${{ matrix.deg }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Build all-in-one image ───────────────────────────────────────────
  build-all:
    name: Build tandem:all
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for all-in-one image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}
          tags: |
            # PR branch → :all-ymagen-docker-release-images (for testing)
            type=raw,value=all-${{ github.ref_name }},enable=${{ github.ref_type == 'branch' }}
            # Version tag → :all-1.2.0, :all-1.2, :all, :all-latest
            type=raw,value=all-${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=all-latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=all,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push all-in-one image
        uses: docker/build-push-action@v5
        with:
          context: docker/release
          file: docker/release/Dockerfile.all
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
